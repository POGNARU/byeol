<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>별 · 나의 밤하늘 서고</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7EE; --deep:#0F2D1F; --deep2:#1A4A35;
    --gold:#E2C77B; --ink:#26332B; --muted:#7C8B80;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--ink);
    font-family:"Noto Sans KR",sans-serif;word-break:keep-all;line-height:1.7}
  .serif{font-family:"Noto Serif KR",serif}
  a{text-decoration:none;color:inherit}

  /* 밤하늘 히어로 */
  .hero{position:relative;overflow:hidden;
    background:linear-gradient(180deg,var(--deep) 0%,var(--deep2) 100%);
    color:var(--cream);text-align:center;padding:64px 22px 58px}
  .hero svg.bg{position:absolute;inset:0;width:100%;height:100%;opacity:.9}
  .hero .inner{position:relative;z-index:1;max-width:680px;margin:0 auto}
  .hero img{height:38px;margin-bottom:20px;opacity:.95}
  .eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--gold);margin:0 0 14px}
  .hero h1{font-family:"Noto Serif KR",serif;font-size:38px;font-weight:600;
    margin:0 0 12px;letter-spacing:.04em}
  .hero p{font-size:15px;opacity:.88;margin:0;max-width:440px;
    margin-left:auto;margin-right:auto;line-height:1.8}

  /* 서고 */
  main{max-width:760px;margin:0 auto;padding:44px 22px 20px}
  .shelf-title{font-family:"Noto Serif KR",serif;color:var(--deep2);
    font-size:20px;font-weight:600;margin:0 0 4px}
  .shelf-sub{color:var(--muted);font-size:13px;margin:0 0 26px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
  .night{display:block;background:linear-gradient(180deg,#12331F 0%,#1E5240 100%);
    border-radius:16px;padding:22px 20px 20px;color:var(--cream);
    position:relative;overflow:hidden;min-height:170px;
    box-shadow:0 3px 14px rgba(15,45,31,.16);transition:transform .18s ease, box-shadow .18s ease}
  .night:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(15,45,31,.26)}
  .night .mini{position:absolute;inset:0;opacity:.85}
  .night .body{position:relative;z-index:1}
  .night .date{font-size:12px;letter-spacing:.06em;color:var(--gold);margin:0 0 8px}
  .night .name{font-family:"Noto Serif KR",serif;font-size:20px;font-weight:600;margin:0 0 6px}
  .night .count{font-size:13px;opacity:.85;margin:0}
  .night .go{position:relative;z-index:1;margin-top:16px;font-size:12px;
    color:var(--gold);letter-spacing:.04em}

  footer{text-align:center;color:var(--muted);font-size:11px;
    letter-spacing:.06em;padding:34px 20px 44px;opacity:.85}
  footer .lock{display:block;margin-bottom:6px;font-size:12px;color:#9AA79E}
</style>
</head>
<body>

  <header class="hero">
    <svg class="bg" viewBox="0 0 800 320" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g fill="#FBF7EE">
        <circle cx="60" cy="50" r="1.1" opacity=".5"/><circle cx="150" cy="90" r="0.8" opacity=".35"/>
        <circle cx="230" cy="40" r="1.3" opacity=".6"/><circle cx="320" cy="80" r="0.9" opacity=".4"/>
        <circle cx="410" cy="45" r="1.1" opacity=".5"/><circle cx="500" cy="95" r="0.8" opacity=".35"/>
        <circle cx="590" cy="50" r="1.2" opacity=".55"/><circle cx="680" cy="85" r="1.0" opacity=".45"/>
        <circle cx="750" cy="45" r="1.1" opacity=".5"/>
        <circle cx="90" cy="200" r="0.9" opacity=".4"/><circle cx="200" cy="250" r="1.1" opacity=".5"/>
        <circle cx="300" cy="220" r="0.8" opacity=".35"/><circle cx="420" cy="260" r="1.0" opacity=".45"/>
        <circle cx="540" cy="225" r="0.9" opacity=".4"/><circle cx="640" cy="255" r="1.2" opacity=".55"/>
        <circle cx="730" cy="215" r="0.9" opacity=".4"/>
      </g>
      <g fill="#E2C77B">
        <circle cx="250" cy="130" r="2.6"/><circle cx="360" cy="160" r="2"/>
        <circle cx="470" cy="120" r="2.8"/><circle cx="560" cy="170" r="2.2"/>
      </g>
      <polyline points="250,130 360,160 470,120 560,170" fill="none" stroke="#E2C77B" stroke-width="0.8" opacity=".3"/>
    </svg>
    <div class="inner">
      <img src="https://clbookslower.github.io/deeper-os/DEEPER_logo.png" alt="DEEPER" onerror="this.style.display='none'">
      <p class="eyebrow">DEEPER OS · 밤하늘 서고</p>
      <h1 class="serif">별</h1>
      <p>한 주 동안 건져 올린 한 줄들이 별이 되어 뜨는 곳. 매주의 밤하늘을 여기 모읍니다.</p>
    </div>
  </header>

  <main>
    <h2 class="shelf-title">지나온 밤하늘</h2>
    <p class="shelf-sub">카드를 누르면 그 주의 하늘이 열려요.</p>

    <div class="grid">

      <!-- 밤하늘 카드 (최신이 위) -->
      <a class="night" href="entries/nightsky_2026-07-04.html">
        <svg class="mini" viewBox="0 0 240 170" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="#FBF7EE" opacity=".28">
            <circle cx="30" cy="30" r="1"/><circle cx="90" cy="20" r="0.8"/><circle cx="160" cy="35" r="1.1"/>
            <circle cx="210" cy="25" r="0.9"/><circle cx="50" cy="140" r="0.9"/><circle cx="120" cy="150" r="1"/>
            <circle cx="190" cy="135" r="0.8"/><circle cx="220" cy="110" r="0.9"/>
          </g>
          <polyline points="40,90 80,60 130,95 175,55 210,85" fill="none" stroke="#E2C77B" stroke-width="0.8" opacity=".35"/>
          <g fill="#E2C77B">
            <circle cx="40" cy="90" r="3"/><circle cx="80" cy="60" r="2.4"/><circle cx="130" cy="95" r="2.8"/>
            <circle cx="175" cy="55" r="2.4"/><circle cx="210" cy="85" r="2.2"/>
          </g>
        </svg>
        <div class="body">
          <p class="date">2026 · 첫 번째 밤하늘</p>
          <p class="name serif">6월 29일 – 7월 4일</p>
          <p class="count">별 16개 · 문법의 달 6/30</p>
        </div>
        <div class="go">열어보기 →</div>
      </a>

    </div>
  </main>

  <footer>
    <span class="lock">🔒 링크를 아는 사람만 볼 수 있는 조용한 서고입니다</span>
    DEEPER 언브랜딩 살롱 · 디퍼 OS · 밤하늘
  </footer>

</body>
</html>
