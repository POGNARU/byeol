<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>별 · 나의 밤하늘 서고</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --moon:#F3ECD8;        /* 달빛 글씨 */
    --gold:#E2C77B;
    --mist:rgba(243,236,216,.72);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    color:var(--moon);
    font-family:"Noto Sans KR",sans-serif;
    word-break:keep-all;line-height:1.7;
    min-height:100vh;
    background:
      radial-gradient(1200px 700px at 78% -8%, #17324a 0%, rgba(23,50,74,0) 60%),
      radial-gradient(1000px 800px at 12% 108%, #123528 0%, rgba(18,53,40,0) 62%),
      linear-gradient(180deg, #060d18 0%, #0a1a2b 45%, #0b2320 100%);
    background-attachment:fixed;
    position:relative;overflow-x:hidden;
  }
  .serif{font-family:"Noto Serif KR",serif}
  a{text-decoration:none;color:inherit}

  /* 별밤 레이어 */
  #stars,#stars2,#twinkle{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;border-radius:50%;background:#fff}
  .tw{position:absolute;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,rgba(226,199,123,.9) 40%,rgba(226,199,123,0) 72%);
    animation:tw 3.6s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}
  @media (prefers-reduced-motion:reduce){.tw{animation:none;opacity:.7}}

  .content{position:relative;z-index:1}

  /* 히어로 */
  .hero{text-align:center;padding:88px 22px 40px;max-width:720px;margin:0 auto}
  .hero img{height:34px;margin-bottom:26px;opacity:.8}
  .eyebrow{font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--gold);opacity:.9;margin:0 0 20px}
  .title{
    font-family:"Noto Serif KR",serif;font-weight:400;
    font-size:clamp(64px,17vw,120px);line-height:1;margin:0 0 22px;
    /* 달빛 글씨: 반투명 + 은은한 빛무리, 뒤 별밤이 글자 안으로 비친다 */
    color:rgba(243,236,216,.90);
    text-shadow:
      0 0 18px rgba(243,236,216,.35),
      0 0 46px rgba(226,199,123,.30),
      0 0 90px rgba(160,190,220,.20);
    letter-spacing:.08em;
  }
  .hero p{font-size:15px;color:var(--mist);margin:0 auto;max-width:430px;
    line-height:1.9;font-weight:300}

  /* 서고 */
  main{max-width:820px;margin:0 auto;padding:26px 22px 20px}
  .shelf-head{display:flex;align-items:baseline;gap:12px;margin:0 4px 22px;
    border-bottom:1px solid rgba(243,236,216,.14);padding-bottom:14px}
  .shelf-title{font-family:"Noto Serif KR",serif;font-size:19px;font-weight:500;
    color:var(--moon);margin:0}
  .shelf-sub{color:var(--mist);font-size:12.5px;font-weight:300}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  /* 반투명 유리 카드 — 뒤 밤하늘이 비친다 */
  .night{display:block;position:relative;overflow:hidden;min-height:186px;
    padding:24px 22px 20px;border-radius:18px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(243,236,216,.16);
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    box-shadow:0 6px 26px rgba(0,0,0,.28);
    transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease}
  .night:hover{transform:translateY(-4px);
    box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:rgba(226,199,123,.5)}
  .night .mini{position:absolute;inset:0;opacity:.7;z-index:0}
  .night .body{position:relative;z-index:1}
  .night .date{font-size:12px;letter-spacing:.05em;color:var(--gold);margin:0 0 8px}
  .night .name{font-family:"Noto Serif KR",serif;font-size:21px;font-weight:500;
    margin:0 0 7px;color:var(--moon)}
  .night .count{font-size:13px;color:var(--mist);margin:0;font-weight:300}
  .night .go{position:relative;z-index:1;margin-top:16px;font-size:12px;
    color:var(--gold);letter-spacing:.05em;opacity:.9}

  footer{position:relative;z-index:1;text-align:center;
    color:var(--mist);font-size:11px;letter-spacing:.05em;
    padding:40px 20px 48px;font-weight:300}
  footer .lock{display:block;margin-bottom:7px;font-size:12px;color:rgba(243,236,216,.6)}
</style>
</head>
<body>
  <div id="stars"></div>
  <div id="twinkle"></div>

  <div class="content">
    <header class="hero">
      <img src="https://clbookslower.github.io/deeper-os/DEEPER_logo.png" alt="DEEPER" onerror="this.style.display='none'">
      <p class="eyebrow">DEEPER OS · 밤하늘 서고</p>
      <h1 class="title">별</h1>
      <p>한 주 동안 건져 올린 한 줄들이 별이 되어 뜨는 곳.<br>매주의 밤하늘을 여기 모읍니다.</p>
    </header>

    <main>
      <div class="shelf-head">
        <h2 class="shelf-title serif">지나온 밤하늘</h2>
        <span class="shelf-sub">카드를 누르면 그 주의 하늘이 열려요</span>
      </div>

      <div class="grid">

        <!-- 밤하늘 카드 (최신이 위) -->
        <a class="night" href="entries/nightsky_2026-07-04.html">
          <svg class="mini" viewBox="0 0 240 186" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g fill="#F3ECD8" opacity=".22">
              <circle cx="28" cy="30" r="1"/><circle cx="92" cy="22" r="0.8"/><circle cx="162" cy="34" r="1.1"/>
              <circle cx="212" cy="26" r="0.9"/><circle cx="52" cy="150" r="0.9"/><circle cx="120" cy="162" r="1"/>
              <circle cx="192" cy="146" r="0.8"/><circle cx="222" cy="118" r="0.9"/>
            </g>
            <polyline points="40,100 82,66 132,104 178,60 214,92" fill="none" stroke="#E2C77B" stroke-width="0.8" opacity=".4"/>
            <g fill="#E2C77B">
              <circle cx="40" cy="100" r="3"/><circle cx="82" cy="66" r="2.4"/><circle cx="132" cy="104" r="2.8"/>
              <circle cx="178" cy="60" r="2.4"/><circle cx="214" cy="92" r="2.2"/>
            </g>
          </svg>
          <div class="body">
            <p class="date">2026 · 첫 번째 밤하늘</p>
            <p class="name serif">6월 29일 – 7월 4일</p>
            <p class="count">별 16개 · 문법의 달 6/30</p>
          </div>
          <div class="go">열어보기 →</div>
        </a>

      </div>
    </main>

    <footer>
      <span class="lock">🔒 링크를 아는 사람만 볼 수 있는 조용한 서고입니다</span>
      DEEPER 언브랜딩 살롱 · 디퍼 OS · 밤하늘
    </footer>
  </div>

  <script>
    // 별밤 — 화면 가득 반짝이는 별 (자기완결, 외부 의존 없음)
    (function(){
      var s = document.getElementById('stars');
      var t = document.getElementById('twinkle');
      var W = window.innerWidth, H = Math.max(window.innerHeight, document.body.scrollHeight);
      // 잔별
      var n = Math.min(180, Math.round(W*H/9000));
      var frag = document.createDocumentFragment();
      for(var i=0;i<n;i++){
        var d = document.createElement('div');
        d.className='star';
        var r = Math.random()*1.4+0.3;
        d.style.width=d.style.height=r+'px';
        d.style.left=(Math.random()*100)+'%';
        d.style.top=(Math.random()*100)+'%';
        d.style.opacity=(Math.random()*0.6+0.25).toFixed(2);
        frag.appendChild(d);
      }
      s.appendChild(frag);
      // 반짝이는 큰 별
      var m = Math.min(34, Math.round(W*H/48000));
      var frag2 = document.createDocumentFragment();
      for(var j=0;j<m;j++){
        var g = document.createElement('div');
        g.className='tw';
        var rr = Math.random()*2.4+1.6;
        g.style.width=g.style.height=rr+'px';
        g.style.left=(Math.random()*100)+'%';
        g.style.top=(Math.random()*96)+'%';
        g.style.animationDelay=(Math.random()*3.6).toFixed(2)+'s';
        g.style.animationDuration=(Math.random()*2.4+2.8).toFixed(2)+'s';
        frag2.appendChild(g);
      }
      t.appendChild(frag2);
    })();
  </script>
</body>
</html>
